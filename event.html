<!-- ============================================
     PAGE 4: event.html (Event Booking)
     ============================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Host an Event - The Bay Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-black: #000000;
            --milk-cream: #FFFDD0;
            --glass-border: rgba(255, 253, 208, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Lato', sans-serif;
            background: var(--pure-black);
            color: var(--milk-cream);
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)); z-index: -1; }
        h1, h2, h3, h4, .playfair { font-family: 'Playfair Display', serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 40px; border-bottom: 1px solid var(--glass-border); }
        .logo { font-size: 1.8rem; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); text-decoration: none; color: var(--milk-cream); }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--milk-cream); text-decoration: none; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: opacity 0.3s; position: relative; }
        .nav-links a:hover { opacity: 0.7; }
        .nav-links a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background: var(--milk-cream); transition: width 0.3s; }
        .nav-links a:hover::after { width: 100%; }
        .btn { background: var(--milk-cream); color: var(--pure-black); border: none; padding: 15px 30px; font-family: 'Lato', sans-serif; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; text-align: center; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 253, 208, 0.3); }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; background: transparent; border: 1px solid var(--milk-cream); color: var(--milk-cream); padding: 10px 20px; font-size: 0.85rem; font-family: 'Lato', sans-serif; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-bottom: 30px; transition: all 0.3s ease; text-decoration: none; }
        .back-btn:hover { background: var(--milk-cream); color: var(--pure-black); }
        .form-container { max-width: 700px; margin: 0 auto; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 50px; backdrop-filter: blur(10px); }
        .form-title { font-size: 2.5rem; margin-bottom: 10px; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .form-subtitle { text-align: center; margin-bottom: 40px; opacity: 0.8; font-size: 1.1rem; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; font-weight: 700; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: var(--milk-cream); padding: 15px; font-family: 'Lato', sans-serif; font-size: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .event-spaces { margin: 30px 0; padding: 20px; background: rgba(255,253,208,0.05); border: 1px solid var(--glass-border); }
        .event-spaces h3 { margin-bottom: 15px; font-size: 1.1rem; }
        .space-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .space-option { padding: 10px; border: 1px solid var(--glass-border); text-align: center; font-size: 0.9rem; }
        .mobile-menu-btn { display: none; background: none; border: none; color: var(--milk-cream); font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .nav-links { display: none; } .mobile-menu-btn { display: block; } .form-container { padding: 30px; } .form-title { font-size: 1.8rem; } .form-row { grid-template-columns: 1fr; } .space-options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-header">
            <a href="index.html" class="logo playfair">The Bay Lounge</a>
            <button class="mobile-menu-btn">☰</button>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="events.html">Events</a>
                <a href="vip.html">VIP</a>
                <a href="apartment.html">Apartments</a>
                <a href="about.html">About</a>
            </div>
        </nav>
        <a href="index.html" class="back-btn">← Back to Home</a>
        <div class="form-container">
            <h1 class="form-title playfair">Host Your Event</h1>
            <p class="form-subtitle">Create unforgettable moments with us</p>
            <form id="event-form" onsubmit="submitEvent(event)">
                <div class="form-group"><label>Event Type</label><select id="event-type" required><option value="">Select event type</option><option value="Birthday Party">Birthday Party</option><option value="Corporate Event">Corporate Event</option><option value="Wedding Reception">Wedding Reception</option><option value="Private Dinner">Private Dinner</option><option value="Product Launch">Product Launch</option><option value="Anniversary">Anniversary</option><option value="Other">Other</option></select></div>
                <div class="form-group"><label>Your Name</label><input type="text" id="host-name" required placeholder="Full name"></div>
                <div class="form-row"><div class="form-group"><label>Email</label><input type="email" id="host-email" required placeholder="Email address"></div><div class="form-group"><label>Phone Number</label><input type="tel" id="host-phone" required placeholder="Contact number"></div></div>
                <div class="form-row"><div class="form-group"><label>Event Date</label><input type="date" id="event-date" required></div><div class="form-group"><label>Expected Guests</label><select id="guest-count" required><option value="">Select range</option><option value="10-20">10 - 20 guests</option><option value="20-50">20 - 50 guests</option><option value="50-100">50 - 100 guests</option><option value="100-200">100 - 200 guests</option><option value="200+">200+ guests</option></select></div></div>
                <div class="form-row"><div class="form-group"><label>Start Time</label><input type="time" id="start-time" required></div><div class="form-group"><label>End Time</label><input type="time" id="end-time" required></div></div>
                <div class="form-group"><label>Preferred Space</label><select id="space-preference"><option value="">No preference</option><option value="Main Lounge">Main Lounge</option><option value="Rooftop Terrace">Rooftop Terrace</option><option value="Private Dining Room">Private Dining Room</option><option value="VIP Section">VIP Section</option><option value="Full Venue">Full Venue</option></select></div>
                <div class="form-group"><label>Budget Range (Optional)</label><select id="budget-range"><option value="">Select budget range</option><option value="₦500k - ₦1m">₦500,000 - ₦1,000,000</option><option value="₦1m - ₦3m">₦1,000,000 - ₦3,000,000</option><option value="₦3m - ₦5m">₦3,000,000 - ₦5,000,000</option><option value="₦5m+">₦5,000,000+</option></select></div>
                <div class="form-group"><label>Event Details & Requirements</label><textarea id="event-details" rows="4" placeholder="Tell us about your vision, dietary requirements, entertainment needs, decoration preferences..."></textarea></div>
                <div class="event-spaces"><h3>Available Spaces</h3><div class="space-options"><div class="space-option">Main Lounge (150 pax)</div><div class="space-option">Rooftop (80 pax)</div><div class="space-option">Private Room (30 pax)</div><div class="space-option">VIP Section (40 pax)</div></div></div>
                <button type="submit" class="btn">Send Event Inquiry</button>
            </form>
        </div>
    </div>
    <script>
        const WHATSAPP_NUMBER = '2348092949597';
        document.getElementById('event-date').min = new Date().toISOString().split('T')[0];
        function submitEvent(e) {
            e.preventDefault();
            const eventType = document.getElementById('event-type').value, name = document.getElementById('host-name').value, email = document.getElementById('host-email').value, phone = document.getElementById('host-phone').value, date = document.getElementById('event-date').value, guests = document.getElementById('guest-count').value, startTime = document.getElementById('start-time').value, endTime = document.getElementById('end-time').value, space = document.getElementById('space-preference').value, budget = document.getElementById('budget-range').value, details = document.getElementById('event-details').value;
            let message = `*Event Hosting Inquiry*%0A%0A*Event Type:* ${eventType}%0A*Host Name:* ${name}%0A*Email:* ${email}%0A*Phone:* ${phone}%0A*Date:* ${date}%0A*Time:* ${startTime} - ${endTime}%0A*Expected Guests:* ${guests}%0A${space ? `*Preferred Space:* ${space}%0A` : ''}${budget ? `*Budget Range:* ${budget}%0A` : ''}${details ? `*Details:* ${details}%0A` : ''}%0APlease send availability and package options.`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
            e.target.reset();
        }
    </script>
</body>
</html>
